<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summit Web Co. | Affordable Web & Discord Design</title>
  <meta name="description" content="Summit Web Co. creates affordable websites, Discord designs, and custom digital services for businesses, communities, and creators." />
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Y9YMrS8S/Chat-GPT-Image-Mar-15-2026-02-11-25-PM.png" />
  <link rel="apple-touch-icon" href="https://i.postimg.cc/Y9YMrS8S/Chat-GPT-Image-Mar-15-2026-02-11-25-PM.png" />
  <style>
    :root {
      --bg: #07101c;
      --bg-2: #0d1626;
      --panel: rgba(255,255,255,0.06);
      --text: #f4f8ff;
      --muted: #b8c8de;
      --line: rgba(255,255,255,0.13);
      --blue: #1d7be8;
      --blue-2: #49b9ff;
      --silver: #dfe5ee;
      --accent: #76d2ff;
      --danger: #fb7185;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius: 24px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(73,185,255,0.12), transparent 28%),
        radial-gradient(circle at left top, rgba(29,123,232,0.16), transparent 32%),
        linear-gradient(180deg, #050b14 0%, #09111e 45%, #0c1627 100%);
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font: inherit; }
    .container { width: min(92%, var(--max)); margin: 0 auto; }
    .section { padding: 88px 0; scroll-margin-top: 110px; }
    .section-title { font-size: clamp(2rem, 4vw, 3.2rem); margin: 0 0 12px; }
    .section-subtitle { color: var(--muted); line-height: 1.8; max-width: 760px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 999px;
      border: 1px solid rgba(118, 210, 255, 0.22);
      background: rgba(73,185,255,0.08);
      color: #dff5ff; font-size: 0.92rem; font-weight: 700;
    }

    header {
      position: sticky; top: 0; z-index: 1000;
      backdrop-filter: blur(14px);
      background: rgba(7,16,28,0.82);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      min-height: 78px; display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }

    .brand {
      display: flex; align-items: center; gap: 14px; font-weight: 800; letter-spacing: 0.4px;
    }

    .brand img {
      width: 50px; height: 50px; object-fit: cover; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 10px 24px rgba(29,123,232,0.22);
      background: #0c1627;
    }

    .nav-links {
      display: flex; align-items: center; flex-wrap: wrap; gap: 18px;
    }

    .nav-links a, .nav-links button {
      color: var(--muted); font-weight: 600; transition: 0.2s ease; background: transparent; border: 0; cursor: pointer; padding: 0;
    }
    .nav-links a:hover, .nav-links button:hover { color: var(--text); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      border: none; cursor: pointer; border-radius: 18px; padding: 14px 20px;
      font-weight: 700; transition: 0.25s ease; text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      box-shadow: 0 18px 36px rgba(29,123,232,0.24);
    }
    .btn-secondary {
      color: var(--text); background: rgba(255,255,255,0.07); border: 1px solid var(--line);
    }
    .btn-danger { color: #fff; background: var(--danger); }
    .btn-small { padding: 10px 14px; border-radius: 14px; }

    .hero { padding: 56px 0 36px; }
    .hero-grid {
      display: grid; grid-template-columns: 1.08fr 0.92fr; gap: 34px; align-items: center;
    }
    .hero h1 {
      font-size: clamp(2.7rem, 6vw, 5rem);
      line-height: 1.03; margin: 18px 0;
    }
    .hero p {
      color: var(--muted); font-size: 1.08rem; line-height: 1.9; max-width: 720px;
    }
    .hero-cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 28px; }
    .hero-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 30px; }
    .stat, .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .stat { padding: 18px; }
    .stat strong { display: block; font-size: 1.35rem; margin-bottom: 6px; }
    .stat span { color: var(--muted); font-size: 0.94rem; }

    .hero-card { padding: 26px; }
    .hero-card-top {
      display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 22px;
    }
    .mini-pill {
      display: inline-flex; padding: 9px 12px; border-radius: 999px;
      color: #ddf9ef; border: 1px solid rgba(52,211,153,0.2); background: rgba(52,211,153,0.1);
      font-size: 0.86rem; font-weight: 700;
    }
    .price-card {
      background: rgba(7,16,28,0.78); border: 1px solid var(--line); border-radius: 22px; padding: 22px; margin-bottom: 14px;
    }
    .price-card h3 { margin: 0 0 8px; }
    .price-card p { margin: 0; color: var(--muted); line-height: 1.75; }
    .price { font-size: 1.9rem; font-weight: 800; margin: 10px 0; color: var(--silver); }

    .grid-2, .grid-3 { display: grid; gap: 22px; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .card { padding: 24px; }
    .card p { color: var(--muted); line-height: 1.8; }
    .service-icon, .team-icon {
      width: 54px; height: 54px; border-radius: 17px; display: grid; place-items: center;
      font-size: 1.25rem; margin-bottom: 18px; color: white;
      background: linear-gradient(135deg, rgba(29,123,232,0.28), rgba(73,185,255,0.18));
      border: 1px solid rgba(255,255,255,0.14);
    }

    .about-layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; }
    .founder-role { color: var(--accent); font-weight: 700; margin-bottom: 12px; }

    .shop-toolbar {
      display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 24px;
    }

    .product-card {
      display: flex; flex-direction: column; overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow);
    }
    .product-top {
      min-height: 165px; padding: 24px;
      background: linear-gradient(135deg, rgba(29,123,232,0.18), rgba(73,185,255,0.12), rgba(223,229,238,0.06));
      display: flex; align-items: flex-end;
    }
    .product-body { padding: 0 22px 22px; }
    .price-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 12px; }

    .cart-shell { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; }
    .cart-items { display: grid; gap: 14px; }
    .cart-item {
      display: grid; grid-template-columns: 1fr auto auto auto; gap: 14px; align-items: center;
      background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 18px; padding: 16px;
    }
    .qty-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 34px; height: 34px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.08); color: var(--text); cursor: pointer;
    }

    .small, .note { color: var(--muted); line-height: 1.75; font-size: 0.95rem; }
    .muted-strong { color: var(--silver); font-weight: 700; }

    form { display: grid; gap: 14px; }
    label { font-weight: 700; font-size: 0.95rem; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .input, textarea, select {
      width: 100%; padding: 14px 16px; border-radius: 16px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.06); color: var(--text); outline: none;
    }
    textarea { min-height: 160px; resize: vertical; }

    .custom-order-box {
      padding: 24px; border-radius: 24px;
      background: linear-gradient(135deg, rgba(29,123,232,0.18), rgba(73,185,255,0.08), rgba(223,229,238,0.05));
      border: 1px solid var(--line);
    }

    .legal-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px;
    }

    .notice {
      margin-top: 16px; padding: 14px 16px; border-radius: 16px;
      border: 1px solid rgba(52,211,153,0.2); background: rgba(52,211,153,0.08); color: #ddf9ef; display: none;
    }

    footer {
      padding: 26px 0 56px; border-top: 1px solid var(--line); color: var(--muted);
    }
    .footer-grid { display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr; gap: 22px; }
    .footer-links { display: grid; gap: 10px; }

    .hidden { display: none !important; }

    @media (max-width: 1024px) {
      .hero-grid, .about-layout, .cart-shell, .footer-grid, .grid-3, .grid-2, .legal-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .nav { flex-direction: column; align-items: flex-start; padding: 14px 0; }
      .hero-stats, .form-grid { grid-template-columns: 1fr; }
      .cart-item { grid-template-columns: 1fr; }
      .section { padding: 72px 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <button class="brand" type="button" onclick="scrollToSection('home')" aria-label="Go to home" style="background:transparent;border:0;padding:0;cursor:pointer;color:inherit;">
        <img src="https://i.postimg.cc/Y9YMrS8S/Chat-GPT-Image-Mar-15-2026-02-11-25-PM.png" alt="Summit Web Co. logo" />
        <span>Summit Web Co.</span>
      </button>

      <nav class="nav-links">
        <button type="button" onclick="scrollToSection('home')">Home</button>
        <button type="button" onclick="scrollToSection('services')">Services</button>
        <button type="button" onclick="scrollToSection('about')">About</button>
        <button type="button" onclick="scrollToSection('shop')">Shop</button>
        <button type="button" onclick="scrollToSection('custom-order')">Custom Orders</button>
        <button type="button" onclick="scrollToSection('cart')">Cart</button>
        <button type="button" onclick="scrollToSection('contact')">Contact</button>
        <button type="button" onclick="scrollToSection('legal')">Legal</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="container hero-grid">
        <div>
          <span class="badge">Affordable digital services with professional standards</span>
          <h1>Designed to help people who need quality work without high prices.</h1>
          <p>
            Summit Web Co. creates affordable websites, Discord designs, and custom digital services for businesses, communities, and creators. Our mission is simple: support people who may not have the budget for expensive design services while still delivering work that looks polished, modern, and professional.
          </p>
          <div class="hero-cta">
            <button class="btn btn-primary" type="button" onclick="scrollToSection('shop')">Browse Services</button>
            <button class="btn btn-secondary" type="button" onclick="scrollToSection('custom-order')">Request Custom Work</button>
          </div>
          <div class="hero-stats">
            <div class="stat">
              <strong>Affordable</strong>
              <span>Pricing built to stay more accessible for smaller budgets.</span>
            </div>
            <div class="stat">
              <strong>Custom</strong>
              <span>We work around your needs instead of forcing one-size-fits-all services.</span>
            </div>
            <div class="stat">
              <strong>Dedicated</strong>
              <span>Young leadership with serious work ethic, discipline, and vision.</span>
            </div>
          </div>
        </div>

        <div class="card hero-card">
          <div class="hero-card-top">
            <div>
              <strong>Featured Affordable Packages</strong>
              <div class="small">Built around accessibility, not inflated pricing</div>
            </div>
            <span class="mini-pill">Orders Open</span>
          </div>

          <div class="price-card">
            <h3>Starter Website</h3>
            <div class="price">$45</div>
            <p>A simple business or personal landing page for clients who need a clean online presence on a smaller budget.</p>
          </div>

          <div class="price-card">
            <h3>Discord Design Setup</h3>
            <div class="price">$30</div>
            <p>Server channels, roles, ordering structure, ticket flow, and a more organized branded setup.</p>
          </div>

          <div class="price-card">
            <h3>Presence Bundle</h3>
            <div class="price">$70</div>
            <p>A lower-cost combined package for clients who need a website and a cleaner digital business presence.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="services">
      <div class="container">
        <h2 class="section-title">Our Services</h2>
        <p class="section-subtitle">We focus on useful, professional work that helps businesses and communities look stronger online without placing pricing out of reach.</p>
        <div class="grid-3" style="margin-top:28px;">
          <article class="card">
            <div class="service-icon">🌐</div>
            <h3>Website Design</h3>
            <p>Landing pages, business websites, starter sites, and polished web layouts designed to help clients establish a more trustworthy online presence.</p>
          </article>
          <article class="card">
            <div class="service-icon">💬</div>
            <h3>Discord Design</h3>
            <p>Role structures, category setups, ticket systems, embeds, order panels, and organized server systems tailored to your community or business.</p>
          </article>
          <article class="card">
            <div class="service-icon">🛠️</div>
            <h3>Custom Orders</h3>
            <p>Need something specific? We also accept custom requests so clients can get services shaped around their exact goals and available budget.</p>
          </article>
        </div>
      </div>
    </section>

    <section class="section" id="about">
      <div class="container">
        <h2 class="section-title">About Summit Web Co.</h2>
        <p class="section-subtitle">A company built on vision, affordability, and the belief that professionalism is shown through quality and commitment, not age alone.</p>
        <div class="about-layout" style="margin-top:28px;">
          <div class="card">
            <h3>Our Story</h3>
            <p>Summit Web Co. was founded with a clear purpose: to make quality digital services more accessible for people who may not have the funds to pay the high rates often seen in website design, server development, and online branding. We understand that many startups, small businesses, communities, and young creators need good presentation just as much as larger brands do, but they are often pushed away by pricing that simply is not realistic for their situation.</p>
            <p>That is where Summit Web Co. steps in. Our goal is to bridge that gap by offering lower-cost services while still keeping our work clean, modern, organized, and professional. We believe affordability should not mean poor quality. Instead, it should mean opportunity. We want clients to feel like they can still get support, structure, and a polished digital presence even when funds are limited.</p>
            <p>We are a young team, but we are deeply committed to what we are building. We take pride in communication, presentation, creativity, and constant improvement. Our company is built on dedication, respect, and a serious desire to create work that actually helps people move forward. Whether it is a business website, a redesigned Discord server, an order system, a support panel, or a custom request, we approach every project with purpose and effort.</p>
            <p>Summit Web Co. is not trying to be just another design name online. We want to be known for being dependable, accessible, and genuinely supportive of clients who need professional digital help without being priced out. As we continue to grow, that mission remains at the center of everything we do.</p>
          </div>

          <div class="grid-2">
            <article class="card">
              <div class="team-icon">👑</div>
              <h3>Dravin Moyers</h3>
              <div class="founder-role">Founder & Chief Executive Officer</div>
              <p>Dravin leads the overall vision, direction, and growth of Summit Web Co., helping shape the company’s standards and long-term goals.</p>
            </article>
            <article class="card">
              <div class="team-icon">⚙️</div>
              <h3>Cameron Philips</h3>
              <div class="founder-role">Founder & Chief Operating Officer</div>
              <p>Cameron helps manage operations, organization, and workflow, making sure projects continue moving in a productive and structured direction.</p>
            </article>
            <article class="card" style="grid-column:1 / -1;">
              <div class="team-icon">📣</div>
              <h3>Keontre Carter</h3>
              <div class="founder-role">Co-Founder, Chief Marketing Officer, HR Manager & Discord Designs Overseer</div>
              <p>Keontre leads public presentation, marketing, outreach, brand identity, and client-facing communication while also overseeing HR responsibilities and Discord design direction.</p>
            </article>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="shop">
      <div class="container">
        <div class="shop-toolbar">
          <div>
            <h2 class="section-title" style="margin-bottom:8px;">Affordable Service Shop</h2>
            <p class="section-subtitle" style="margin:0;">Add services to the cart, then submit an order request or ask for something custom.</p>
          </div>
          <button class="btn btn-secondary" type="button" onclick="scrollToSection('cart')">Go to Cart</button>
        </div>
        <div class="grid-3" id="productGrid"></div>
      </div>
    </section>

    <section class="section" id="custom-order">
      <div class="container">
        <div class="custom-order-box">
          <h2 class="section-title" style="margin-top:0;">Custom Orders</h2>
          <p class="section-subtitle">Not seeing exactly what you need? Submit a custom request and tell us your budget, goals, and what kind of service you want.</p>
          <form id="customOrderForm" name="custom-order" method="POST" data-netlify="true" netlify-honeypot="bot-field" style="margin-top:22px;">
            <input type="hidden" name="form-name" value="custom-order" />
            <input type="hidden" name="bot-field" />
            <div class="form-grid">
              <div>
                <label for="customName">Name</label>
                <input class="input" id="customName" name="name" type="text" required />
              </div>
              <div>
                <label for="customEmail">Email</label>
                <input class="input" id="customEmail" name="email" type="email" required />
              </div>
            </div>
            <div class="form-grid">
              <div>
                <label for="customService">Requested Service</label>
                <input class="input" id="customService" name="service" type="text" placeholder="Example: custom website, Discord overhaul, branding help" required />
              </div>
              <div>
                <label for="customBudget">Budget Range</label>
                <input class="input" id="customBudget" name="budget" type="text" placeholder="Example: $20-$50" />
              </div>
            </div>
            <div>
              <label for="customMessage">Project Details</label>
              <textarea id="customMessage" name="message" placeholder="Describe what you need, your goals, your timeline, and anything else helpful." required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Submit Custom Request</button>
          </form>
          <div class="notice" id="customNotice">Your request has been submitted successfully. A confirmation has been received, and our team will review it as soon as possible.</div>
        </div>
      </div>
    </section>

    <section class="section" id="cart">
      <div class="container cart-shell">
        <div class="card">
          <h2 style="margin-top:0;">Shopping Cart</h2>
          <p class="section-subtitle" style="margin-bottom:22px;">Your selected services are saved in your browser so your cart remains available during your visit.</p>
          <div id="cartItems" class="cart-items"></div>
          <div id="emptyCart" class="small">Your cart is empty right now.</div>
        </div>

        <div class="card">
          <h3 style="margin-top:0;">Checkout Request</h3>
          <div id="checkoutSummary" class="small"></div>
          <p class="small"><span class="muted-strong">Total:</span> $<span id="cartTotal">0.00</span></p>
          <form id="checkoutForm" name="checkout-request" method="POST" data-netlify="true" netlify-honeypot="bot-field">
            <input type="hidden" name="form-name" value="checkout-request" />
            <input type="hidden" name="bot-field" />
            <input class="input" type="text" name="name" placeholder="Full Name" required />
            <input class="input" type="email" name="email" placeholder="Email Address" required />
            <input class="input" type="text" name="business" placeholder="Business / Brand Name" />
            <textarea name="details" placeholder="Tell us what you need, your deadline, and any notes for the order" required></textarea>
            <button class="btn btn-primary" type="submit">Submit Checkout Request</button>
          </form>
          <div class="notice" id="checkoutNotice">Your request has been submitted successfully. A confirmation has been received, and our team will review it as soon as possible.</div>
        </div>
      </div>
    </section>

    <section class="section" id="contact">
      <div class="container grid-2">
        <div class="card">
          <h2 style="margin-top:0;">Contact Us</h2>
          <p class="section-subtitle">Use the contact form for support, questions, quotes, or general business inquiries.</p>
          <form id="contactForm" name="contact-request" method="POST" data-netlify="true" netlify-honeypot="bot-field">
            <input type="hidden" name="form-name" value="contact-request" />
            <input type="hidden" name="bot-field" />
            <div class="form-grid">
              <div>
                <label for="contactName">Name</label>
                <input class="input" id="contactName" name="name" type="text" required />
              </div>
              <div>
                <label for="contactEmail">Email</label>
                <input class="input" id="contactEmail" name="email" type="email" required />
              </div>
            </div>
            <div class="form-grid">
              <div>
                <label for="contactSubject">Subject</label>
                <input class="input" id="contactSubject" name="subject" type="text" required />
              </div>
              <div>
                <label for="contactType">Inquiry Type</label>
                <select id="contactType" name="type">
                  <option>General Inquiry</option>
                  <option>Website Design</option>
                  <option>Discord Design</option>
                  <option>Support</option>
                  <option>Partnership</option>
                </select>
              </div>
            </div>
            <div>
              <label for="contactMessage">Message</label>
              <textarea id="contactMessage" name="message" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Send Contact Request</button>
          </form>
          <div class="notice" id="contactNotice">Your request has been submitted successfully. A confirmation has been received, and our team will review it as soon as possible.</div>
        </div>

        <div class="card">
          <h3 style="margin-top:0;">Why Summit Web Co. exists</h3>
          <div class="grid-2">
            <div class="card" style="padding:18px;">
              <h4>Supportive Pricing</h4>
              <p>We want people with limited funds to still have access to quality-looking digital services.</p>
            </div>
            <div class="card" style="padding:18px;">
              <h4>Professional Quality</h4>
              <p>Affordable should still look clean, modern, and well put together.</p>
            </div>
            <div class="card" style="padding:18px;">
              <h4>Flexible Orders</h4>
              <p>Custom requests allow us to better fit your budget and your actual needs.</p>
            </div>
            <div class="card" style="padding:18px;">
              <h4>Young & Driven</h4>
              <p>Our leadership team is young, but committed to building a dependable and meaningful company.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="legal">
      <div class="container">
        <h2 class="section-title">Legal</h2>
        <p class="section-subtitle">Review Summit Web Co. legal and policy documents below.</p>
        <div class="legal-grid" style="margin-top:28px;">
          <article class="card">
            <h3>Terms of Service & Privacy Policy</h3>
            <p>Open the full Terms of Service and Privacy Policy document for Summit Web Co.</p>
            <button class="btn btn-primary" type="button" onclick="openExternal('https://docs.google.com/document/d/1kzYnacsUNAeUBk7WSUaIdNDwgUPwyaUwrr3ZRct6V4c/edit?usp=drivesdk')">Open Policy Document</button>
          </article>
          <article class="card">
            <h3>Liability & Legal Protections</h3>
            <p>Open the liability and legal protections document for Summit Web Co.</p>
            <button class="btn btn-primary" type="button" onclick="openExternal('https://docs.google.com/document/d/1ZpwJ5oOniIxg1kq3ZmQqX26BwALlgVMEStXrpzyMry8/edit?usp=drivesdk')">Open Legal Document</button>
          </article>
          <article class="card">
            <h3>Need Legal Help?</h3>
            <p>For questions about policies, orders, or terms, contact Summit Web Co. directly.</p>
            <button class="btn btn-secondary" type="button" onclick="scrollToSection('contact')">Contact Summit Web Co.</button>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-grid">
      <div>
        <button class="brand" type="button" onclick="scrollToSection('home')" aria-label="Go to home" style="background:transparent;border:0;padding:0;cursor:pointer;color:inherit;margin-bottom:14px;">
          <img src="https://i.postimg.cc/Y9YMrS8S/Chat-GPT-Image-Mar-15-2026-02-11-25-PM.png" alt="Summit Web Co. logo" />
          <span>Summit Web Co.</span>
        </button>
        <p class="small">Affordable websites, Discord design, and custom digital support for businesses, communities, and creators.</p>
      </div>
      <div>
        <h4>Navigation</h4>
        <div class="footer-links">
          <button type="button" onclick="scrollToSection('services')" style="background:transparent;border:0;padding:0;text-align:left;color:inherit;cursor:pointer;">Services</button>
          <button type="button" onclick="scrollToSection('about')" style="background:transparent;border:0;padding:0;text-align:left;color:inherit;cursor:pointer;">About</button>
          <button type="button" onclick="scrollToSection('shop')" style="background:transparent;border:0;padding:0;text-align:left;color:inherit;cursor:pointer;">Shop</button>
          <button type="button" onclick="scrollToSection('contact')" style="background:transparent;border:0;padding:0;text-align:left;color:inherit;cursor:pointer;">Contact</button>
        </div>
      </div>
      <div>
        <h4>Contact</h4>
        <div class="footer-links">
          <span>support@summit-web.com</span>
          <span>Custom orders available</span>
          <span>Official Summit Web Co. Website</span>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const products = [
      {
        id: 1,
        name: 'Starter Website Package',
        price: 45,
        category: 'Website Design',
        description: 'A lower-cost landing page for businesses, creators, or personal brands that need a clean and credible start.'
      },
      {
        id: 2,
        name: 'Business Website Package',
        price: 65,
        category: 'Website Design',
        description: 'A larger but still affordable website package for businesses that need more sections and stronger presentation.'
      },
      {
        id: 3,
        name: 'Discord Design Package',
        price: 30,
        category: 'Discord Design',
        description: 'Roles, categories, basic server structure, and a more organized setup for communities or businesses.'
      },
      {
        id: 4,
        name: 'Order & Support Setup',
        price: 20,
        category: 'Discord Systems',
        description: 'Order panels, support ticket structure, and clearer systems for handling clients and members.'
      },
      {
        id: 5,
        name: 'Brand Wording Upgrade',
        price: 15,
        category: 'Branding',
        description: 'Professional wording, service descriptions, and stronger digital presentation for your business.'
      },
      {
        id: 6,
        name: 'Affordable Presence Bundle',
        price: 70,
        category: 'Bundle',
        description: 'A balanced package that combines key services for clients who need more help while staying on budget.'
      }
    ];

    const productGrid = document.getElementById('productGrid');
    const cartItemsEl = document.getElementById('cartItems');
    const checkoutSummary = document.getElementById('checkoutSummary');
    const cartTotalEl = document.getElementById('cartTotal');
    const emptyCartEl = document.getElementById('emptyCart');

    function scrollToSection(id) {
      const section = document.getElementById(id);
      if (!section) return;
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      history.replaceState(null, '', `#${id}`);
    }

    function openExternal(url) {
      const newWindow = window.open(url, '_blank', 'noopener,noreferrer');
      if (!newWindow) {
        window.location.href = url;
      }
    }

    function getCart() {
      return JSON.parse(localStorage.getItem('summit_cart') || '[]');
    }

    function saveCart(cart) {
      localStorage.setItem('summit_cart', JSON.stringify(cart));
    }

    function renderProducts() {
      productGrid.innerHTML = products.map(product => `
        <article class="product-card">
          <div class="product-top">
            <div>
              <div class="badge">${product.category}</div>
              <h3 style="margin:14px 0 8px;">${product.name}</h3>
            </div>
          </div>
          <div class="product-body">
            <p class="small">${product.description}</p>
            <div class="price-row">
              <strong style="font-size:1.2rem; color: var(--silver);">$${product.price}</strong>
              <button class="btn btn-primary btn-small" type="button" onclick="addToCart(${product.id})">Add to Cart</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    function addToCart(id) {
      const cart = getCart();
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        const product = products.find(p => p.id === id);
        cart.push({ ...product, qty: 1 });
      }
      saveCart(cart);
      renderCart();
      scrollToSection('cart');
    }

    function updateQty(id, amount) {
      const cart = getCart()
        .map(item => {
          if (item.id === id) item.qty += amount;
          return item;
        })
        .filter(item => item.qty > 0);
      saveCart(cart);
      renderCart();
    }

    function removeItem(id) {
      const cart = getCart().filter(item => item.id !== id);
      saveCart(cart);
      renderCart();
    }

    function renderCart() {
      const cart = getCart();
      emptyCartEl.classList.toggle('hidden', cart.length > 0);
      cartItemsEl.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div>
            <strong>${item.name}</strong>
            <div class="small">${item.category}</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" type="button" onclick="updateQty(${item.id}, -1)">-</button>
            <strong>${item.qty}</strong>
            <button class="qty-btn" type="button" onclick="updateQty(${item.id}, 1)">+</button>
          </div>
          <strong>$${(item.price * item.qty).toFixed(2)}</strong>
          <button class="btn btn-danger btn-small" type="button" onclick="removeItem(${item.id})">Remove</button>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      cartTotalEl.textContent = total.toFixed(2);
      checkoutSummary.innerHTML = cart.length
        ? cart.map(item => `<div>${item.qty} × ${item.name} — $${(item.price * item.qty).toFixed(2)}</div>`).join('')
        : '<div>No services selected yet.</div>';
    }

    async function submitNetlifyForm(form, noticeId) {
      const notice = document.getElementById(noticeId);
      const submitButton = form.querySelector('button[type="submit"]');
      const originalButtonText = submitButton ? submitButton.textContent : '';

      try {
        if (submitButton) {
          submitButton.disabled = true;
          submitButton.textContent = 'Submitting...';
        }

        const formData = new FormData(form);
        const response = await fetch('/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(formData).toString()
        });

        if (!response.ok) throw new Error('Form submission failed');

        if (notice) {
          notice.textContent = 'Your request has been submitted successfully. A confirmation has been received, and our team will review it as soon as possible.';
          notice.style.display = 'block';
        }

        form.reset();
        return true;
      } catch (error) {
        return false;
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = originalButtonText;
        }
      }
    }

    function fallbackMailto(subject, body, noticeId) {
      const notice = document.getElementById(noticeId);
      if (notice) {
        notice.textContent = 'Your form could not be submitted through the website here, so your email app will open as a fallback for sending to support@summit-web.com.';
        notice.style.display = 'block';
      }
      window.location.href = `mailto:support@summit-web.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const cart = getCart();
      if (!cart.length) {
        alert('Please add at least one service to the cart first.');
        return;
      }

      const formData = new FormData(this);
      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0).toFixed(2);
      const items = cart.map(item => `${item.qty}x ${item.name} - $${(item.price * item.qty).toFixed(2)}`).join(' | ');

      let summaryInput = this.querySelector('input[name="selected_services"]');
      if (!summaryInput) {
        summaryInput = document.createElement('input');
        summaryInput.type = 'hidden';
        summaryInput.name = 'selected_services';
        this.appendChild(summaryInput);
      }
      summaryInput.value = items;

      let totalInput = this.querySelector('input[name="order_total"]');
      if (!totalInput) {
        totalInput = document.createElement('input');
        totalInput.type = 'hidden';
        totalInput.name = 'order_total';
        this.appendChild(totalInput);
      }
      totalInput.value = total;

      const body = `New checkout request from Summit Web Co. website.\n\nName: ${formData.get('name')}\nEmail: ${formData.get('email')}\nBusiness: ${formData.get('business') || ''}\n\nSelected Services:\n${items}\n\nTotal: $${total}\n\nProject Details:\n${formData.get('details')}`;
      const success = await submitNetlifyForm(this, 'checkoutNotice');

      if (!success) {
        fallbackMailto('Summit Web Co. Checkout Request', body, 'checkoutNotice');
        return;
      }

      localStorage.removeItem('summit_cart');
      renderCart();
    });

    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const body = `New contact request from Summit Web Co. website.\n\nName: ${formData.get('name')}\nEmail: ${formData.get('email')}\nSubject: ${formData.get('subject')}\nInquiry Type: ${formData.get('type')}\n\nMessage:\n${formData.get('message')}`;
      const success = await submitNetlifyForm(this, 'contactNotice');
      if (!success) {
        fallbackMailto(formData.get('subject') || 'Summit Web Co. Contact Request', body, 'contactNotice');
      }
    });

    document.getElementById('customOrderForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const body = `New custom order request from Summit Web Co. website.\n\nName: ${formData.get('name')}\nEmail: ${formData.get('email')}\nRequested Service: ${formData.get('service')}\nBudget: ${formData.get('budget') || 'Not provided'}\n\nProject Details:\n${formData.get('message')}`;
      const success = await submitNetlifyForm(this, 'customNotice');
      if (!success) {
        fallbackMailto('Summit Web Co. Custom Order Request', body, 'customNotice');
      }
    });

    if (window.location.hash) {
      const hashId = window.location.hash.replace('#', '');
      setTimeout(() => scrollToSection(hashId), 100);
    }

    renderProducts();
    renderCart();
  </script>
</body>
</html>
